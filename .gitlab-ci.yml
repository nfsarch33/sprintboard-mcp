variables:
  GO_VERSION: "1.25"
  COVERAGE_THRESHOLD: "70"

stages:
  - lint
  - test
  - build

vet:
  stage: lint
  image: golang:${GO_VERSION}
  tags: [go, docker]
  script:
    - go vet ./...

test:
  stage: test
  image: golang:${GO_VERSION}
  tags: [go, docker]
  script:
    - go test -race -count=1 -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  artifacts:
    paths:
      - coverage.out
    when: always

build:
  stage: build
  image: golang:${GO_VERSION}
  tags: [go, docker]
  script:
    - CGO_ENABLED=0 go build -ldflags="-s -w" ./...

# --- GitHub sync + CI failure notification (v17600) ---

github-sync:
  stage: build
  image: golang:${GO_VERSION}
  tags: [go, docker]
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: "0"
  script:
    - |
      if [ -z "${GITHUB_SYNC_TOKEN}" ] || [ -z "${GITHUB_REPO_URL}" ]; then
        echo "WARN: sync vars not set, skipping"; exit 0
      fi
    - |
      PUSH_URL="${GITHUB_REPO_URL}"
      if echo "${PUSH_URL}" | grep -q "^https://"; then
        PUSH_URL=$(echo "${PUSH_URL}" | sed "s|https://|https://x-access-token:${GITHUB_SYNC_TOKEN}@|")
      fi
    - git remote add github "${PUSH_URL}" 2>/dev/null || git remote set-url github "${PUSH_URL}"
    - git fetch origin --unshallow 2>/dev/null || true
    - git push github "HEAD:${CI_COMMIT_REF_NAME}" --force
    - echo "Synced ${CI_COMMIT_REF_NAME} to GitHub"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG
  after_script:
    - git remote remove github 2>/dev/null || true
  allow_failure: true

ci-failure-notify:
  stage: build
  image: golang:${GO_VERSION}
  tags: [go, docker]
  when: on_failure
  allow_failure: true
  script:
    - |
      if [ -z "${NOTIFICATION_WEBHOOK_URL}" ]; then
        echo "WARN: NOTIFICATION_WEBHOOK_URL not set, skipping"; exit 0
      fi
    - |
      curl -sf -X POST "${NOTIFICATION_WEBHOOK_URL}" -H "Content-Type: application/json"         -d '{"title":"CI failure: '${CI_PROJECT_NAME}' #'${CI_PIPELINE_ID}' on '${CI_COMMIT_REF_NAME}'","status":"open","source":"gitlab-ci"}'         || echo "WARN: notification failed"
  rules:
    - when: on_failure
