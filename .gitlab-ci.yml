variables:
  GO_VERSION: "1.25"
  COVERAGE_THRESHOLD: "70"

stages:
  - lint
  - test
  - build

vet:
  stage: lint
  image: golang:${GO_VERSION}
  tags: [go, docker]
  script:
    - go vet ./...

test:
  stage: test
  image: golang:${GO_VERSION}
  tags: [go, docker]
  script:
    - go test -race -count=1 -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  artifacts:
    paths:
      - coverage.out
    when: always

build:
  stage: build
  image: golang:${GO_VERSION}
  tags: [go, docker]
  script:
    - CGO_ENABLED=0 go build -ldflags="-s -w" ./...
